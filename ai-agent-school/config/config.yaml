# AI Agent School Configuration

school:
  name: "AI Agent School"
  version: "1.0.0"
  check_interval: 300  # seconds (5 minutes)
  max_retries: 3
  production_threshold_days: 7

communication:
  method: "file"  # file-based for MVP
  base_dir: "/shared/ai-school"
  to_student: "/shared/ai-school/to_student"
  from_student: "/shared/ai-school/from_student"
  poll_interval: 5  # seconds

memory:
  backup_enabled: true
  backup_interval: 86400  # daily
  backup_path: "./data/backups"
  verify_writes: true
  student_memory_path: "/home/user/openclaw/memory"

tracking:
  enabled: true
  log_path: "./logs"
  db_path: "./data/mistakes.db"
  retention_days: 30

correction:
  injection_enabled: true
  prompt_update_enabled: true
  max_corrections_per_session: 10
  verification_attempts: 3

cron:
  heartbeat_interval: 300  # 5 minutes
  grace_periods: 2
  auto_heal_enabled: true
  dead_letter_enabled: true
  monitored_jobs:
    - name: "cron-backup"
      command: "systemctl restart backup"
      schedule: "0 2 * * *"
    - name: "cron-sync"
      command: "systemctl restart sync"
      schedule: "*/15 * * * *"

alerts:
  enabled: true
  email:
    enabled: false
    smtp_server: ""
    smtp_port: 587
    from_addr: ""
    to_addr: ""
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""

dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8080
  username: "admin"
  password: "changeme"

teacher:
  name: "Teacher"
  persona: "patient_mentor"
  default_topic: "cron_handling"

student:
  name: "Student"
  enrolled_topic: "cron_handling"
  api_endpoint: "http://localhost:8081"
