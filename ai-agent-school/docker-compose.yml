# AI Agent School - Docker Compose
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ai-school-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_school
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/sql/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # AI Agent School API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-school-api
    environment:
      # Database
      AI_SCHOOL_DB_URL: postgresql://postgres:postgres@postgres:5432/ai_school
      # MiniMax LLM
      AI_SCHOOL_MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      AI_SCHOOL_MINIMAX_BASE_URL: https://api.minimax.chat
      AI_SCHOOL_MINIMAX_MODEL: MiniMax-2.7-highspeed
      # Application
      AI_SCHOOL_DEBUG: "false"
      AI_SCHOOL_HOST: 0.0.0.0
      AI_SCHOOL_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

  # Dashboard (serves static HTML)
  dashboard:
    image: nginx:alpine
    container_name: ai-school-dashboard
    volumes:
      - ./src/dashboard:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8081:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: ai-school-network
